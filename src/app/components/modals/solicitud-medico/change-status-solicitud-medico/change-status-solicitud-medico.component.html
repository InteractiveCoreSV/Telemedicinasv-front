<div class="modal-header border-bottom pb-3">
  <h4 class="modal-title">Cambiar estado de la solicitud de médico</h4>
  <button type="button" class="close  btn-icon" (click)="ngbActiveModal.close()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<div class="modal-body">
  <div class="d-flex" style="flex-direction: column; justify-content: center;">
    <div class="form-check form-check-inline d-flex align-items-center text-left border-bottom pb-4">
      <input
        [(ngModel)]="optionSelected"
        value="Nueva solicitud"
        class="form-check-input cursor-pointer"
        type="radio"
        id="ReservedRadio"
        name="radio2" style="height:1rem !important; width:1rem;"
      />
      <label class="ms-2 form-check-label cursor-pointer" for="ReservedRadio"
        >
        Nueva solicitud <i class="fas fa-check-circle"></i></label
      >
    </div>

    <div class="form-check form-check-inline d-flex align-items-center text-left border-bottom py-4" >
      <input
        [(ngModel)]="optionSelected"
        value="En progreso"
        class="form-check-input cursor-pointer"
        type="radio"
        id="ConfirmedRadio"
        name="radio2" style="height:1rem !important; width:1rem;"
      />
      <label class="ms-2 form-check-label cursor-pointer" for="ConfirmedRadio"
        >
        En progreso <i class="fas fa-check-circle"></i></label
      >
    </div>

    <div class="form-check form-check-inline d-flex align-items-center text-left border-bottom py-4" >
      <input
        [(ngModel)]="optionSelected"
        value="Aceptada"
        class="form-check-input cursor-pointer"
        type="radio"
        id="CompletedRadio"
        name="radio2" style="height:1rem !important; width:1rem;"
      />
      <label class="ms-2 form-check-label cursor-pointer" for="CompletedRadio"
        >
        Aceptada <i class="fas fa-check-circle"></i></label
      >
    </div>

    <div class="form-check form-check-inline d-flex align-items-center text-left border-bottom py-4 text-danger" >
      <input
        [(ngModel)]="optionSelected"
        value="Denegada"
        class="form-check-input cursor-pointer"
        type="radio"
        id="RefuseRadio"
        name="radio2" style="height:1rem !important; width:1rem;"
      />
      <label class="ms-2 form-check-label cursor-pointer" for="RefuseRadio"
        >
        Denegada <i class="fas fa-check-circle"></i></label
      >
    </div>
  </div>

</div>
<!--  -->
<div class="modal-footer w-100 row justify-content-center">
  <button class="col-5 btn btn-secondary btn-sm" type="button" (click)="ngbActiveModal.close()">Cancelar</button>
  <button class="col-5 btn btn-primary btn-shadow btn-sm" type="button" (click)="changeStatus()">Confirmar</button>
</div>
