<div class="modal-header">
    <h5 class="modal-title" id="addQuestionLabel">{{title}} servicio</h5>
    <button type="button" class="btn btn-sm p-0 close " (click)="ngbActiveModal.close()">          
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M19 5L5 19M5.00001 5L19 19" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

</div>
<div class="modal-body">
    <div class="container mb-4 mt-2 " >

        <form [formGroup]="serviceForm" style="max-width: 724px;" class="px-md-5">
            
            <div class="row ">
                <div class="form-gorup col-12 col-md-9">
                    <input type="text" class="form-control center"  name="name" formControlName="name" placeholder="Nombre del Servicio" >
                    <div *ngIf="serviceForm.get('name')?.invalid && formSubmited" class="invalid-feedback d-block" >
                        El nombre es requerido
                    </div>
                </div> 

                <div class="form-gorup col-12 col-md-3 mt-3 mt-md-0">
                    <div class="input-group input-group-merge input-group-borderless input-group-flush input-group-light">

                        <input  
                            type="number" 
                            class="form-control center"  
                            id="inputGroupMergeSearch"   
                            name="price" 
                            formControlName="price"  
                            (input)="formatPriceOnInput($event)"
                            placeholder="0.00" 
                            aria-describedby="inputGroupMergeSearchlAddOn"
                        >
                        <div class="input-group-prepend input-group-text" style="padding: .54688rem .5rem !important; background-color: #f5f5f5;"  id="inputGroupMergeSearchlAddOn">
                            <strong>L </strong>
                          <!-- <img src="assets/icons/icon-search.png" alt=""> -->
                        </div>
                      </div>
                    <div *ngIf="serviceForm.get('price')?.invalid && formSubmited" class="invalid-feedback d-block" >
                        El precio es requerido
                    </div>
                </div> 

                <div class="form-gorup col-12 col-sm-6 mt-3">
                    <!-- <app-select-category-services 
                    [categoriesServicesSelected]="category" 
                    (changecategoriesServices)="setCategory($event)"
                    ></app-select-category-services> -->
                    <app-select-category-services-for-subcategory 
                    [categoriesServicesSelected]="category" 
                    (changecategoriesServices)="setCategory($event)"
                    ></app-select-category-services-for-subcategory>

                    <div *ngIf="serviceForm.get('category')?.invalid && formSubmited" class="invalid-feedback d-block" >
                        La categoría es requerida
                    </div>
                </div> 

                <div class="form-gorup col-12 col-sm-6 mt-3">
                    <app-select-sub-category-service 
                    [apliChange]="toEdit? false : true"
                    [category]="category"
                    [subCategoriesServicesSelected]="subCategory" 
                    (changeSubcategoriesServices)="setSubCategory($event)"
                    ></app-select-sub-category-service>
                    <div *ngIf="serviceForm.get('subCategory')?.invalid && formSubmited" class="invalid-feedback d-block" >
                        La sub categoría es requerida
                    </div>
                </div> 

                <div class="form-gorup col-12 mt-3">
                    <textarea formControlName="description" class="form-control center" rows="3" placeholder="Descripción del servicio"></textarea>
                    
                    <div *ngIf="serviceForm.get('description')?.invalid && formSubmited" class="invalid-feedback d-block" >
                        La descripción es requerida
                    </div>
                </div> 
                
            </div>
            
        </form>
    </div>

    <div class=" d-flex justify-content-end">
        <button type="submit" (click)="toEdit?editService():newService()" class="btn  btn-primary btn-150">
            + Agregar
        </button>
    </div>
</div>
