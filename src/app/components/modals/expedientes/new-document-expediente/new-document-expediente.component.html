<div class="modal-header">
    <h5 class="modal-title" id="addQuestionLabel">Documento de expediente</h5>
    <button type="button" class="btn btn-sm p-0 close " (click)="ngbActiveModal.close()">          
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M19 5L5 19M5.00001 5L19 19" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

</div>
<div class="modal-body">
    <!-- <ng-container *ngIf="!loading;else loading_templ"> -->
        <div class="container mb-4 mt-2 row" >
            <div class="col-12 mb-3">
                <app-dropzone-only-one *ngIf="changeDocumentOption" [accept]="'image/jpeg,image/png,image/gif,application/document,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document'" (filesOutput)="adddocument($event[0])" [label]="'Suelta o selecciona el archivo'"></app-dropzone-only-one>
               
                <div class="d-flex justify-content-center align-items-center flex-column my-2" *ngIf="documentToEdit && documentToEdit.document && !changeDocumentOption">
                    <div class="col-auto d-flex flex-column justify-content-cente align-items-center">
                        <img 
                          class="avatar"  style="width: 5rem; height: 5rem;"
                          [src]="
                            documentToEdit.typeDocument === 'pdf' ? 'assets/images/type-document/pdf.svg' : 
                            documentToEdit.typeDocument === 'word' ? 'assets/images/type-document/word.svg' : 
                            documentToEdit.document.location
                          " 
                          alt="Imagen representativa de archivo"
                        >
                    <button type="button" (click)="changeDocument()" class="btn btn-sm btn-block btn-change-img btn-primary mt-1 w-100">Cambiar documento</button>
                  </div>
            </div>
        

            <div class="col-12  mb-3">
                <label class="form-label" for="signupModalFormLoginEmail">Nombre del documento</label>
                <input
                [(ngModel)]="name"
                type="text"
                name="names"
                aria-label="Nombres"
                placeholder="Nombres"
                class="form-control "
                />
            </div>
            
            <div class="col-12  mb-3">
                <label class="form-label" for="signupModalFormLoginEmail">Catégoria del documento</label>
                <app-select-category-document-expediente [categorySelected]="category" (categorySelectedEv)="category = $event"></app-select-category-document-expediente>
            </div>
            
            <div class="col-12  mb-3">
                <label class="form-label" for="signupModalFormLoginEmail">Comentario</label>
                <textarea class="form-control" name="comment"  #comment  id="" cols="15" rows="5"></textarea>
            </div>
        </div>


    <div class="w-100 text-end">
        <button type="submit" class="btn  btn-primary btn-150" (click)="documentToEdit ? editDocument() : savedocument()">
            Guardar
        </button>
    </div>
</div>
