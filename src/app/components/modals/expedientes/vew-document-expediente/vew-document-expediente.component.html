<div class="modal-header">
    <h5 class="modal-title" id="addQuestionLabel">Documento de expediente</h5>
    <button type="button" class="btn btn-sm p-0 close " (click)="ngbActiveModal.close()">          
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M19 5L5 19M5.00001 5L19 19" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

</div>
<div class="modal-body">
    <div class="container mb-4 mt-2 " >
        <div *ngIf="comment" class="mb-2">
            <label style="color: #000;" class="m-0 p-0">Nombre:</label>
            <p class="m-0 p-0">{{name}}</p>
        </div>
        <div *ngIf="comment" class="mb-2"> 
            <label style="color: #000;" class="m-0 p-0">Comentario del documento:</label>
            <p class="m-0 p-0">{{comment}}</p>
        </div>

        <label style="color: #000;" class="m-0 p-0">Documento:</label>

        <div *ngIf="loading" class="doc-loading">
            <div class="spinner-border text-primary" role="status">
                <span class="sr-only">Cargando...</span>
            </div>
            <p class="mt-2 mb-0 text-muted">Cargando documento...</p>
        </div>

        <div *ngIf="!loading">
            <div *ngIf="typeDocument == 'pdf' && url != ''">
                <ngx-doc-viewer
                [url]="url"
                [viewer]="'pdf'"
                [style]="{ height: '600px', width: '100%' }">
              </ngx-doc-viewer>
            </div>

            <div
                *ngIf="typeDocument == 'word'"
                style="border: 1px solid #2E4A76; border-radius: 8px; padding: 15px; min-height: 400px;"
                [innerHTML]="documentContent"
            >
            </div>

            <div
                class="d-flex justify-content-center"
                *ngIf="typeDocument == 'image'"
            >
                <img [src]="url" (click)="viewAtt(url)" alt="" style="max-width: 90%; border: 1px solid #2E4A76; border-radius: 8px; cursor: pointer;">
            </div>
        </div>

    </div>
</div>
