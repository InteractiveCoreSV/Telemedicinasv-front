<ngx-dropzone [multiple]="multiple" [accept]="accept" #dropzone (change)="onSelect($event)" class="flex-wrap justify-content-center" [style.height]="max_height?max_height:'195px'" [style.width]="max_width?max_width:''">
	  <ngx-dropzone-label>{{label}}</ngx-dropzone-label>

      <ng-container *ngIf="files.length > 0 && files[0].type == 'application/pdf'">
        <ngx-dropzone-preview  
          class="preview-logo-dropzone"
          ngProjectAs="ngx-dropzone-preview" 
          *ngFor="let f of files" [file]="f" 
          (removed)="onRemove(f)" 
          [removable]="true"
          (click)="getImagePreview(f)"   
        >
          <ngx-dropzone-label><img src="assets/images/type-document/pdf.svg" alt="PDF Preview"></ngx-dropzone-label>      
        </ngx-dropzone-preview>
      </ng-container>

      <ng-container *ngIf="files.length > 0 && ['application/msword','application/vnd.openxmlformats-officedocument.wordprocessingml.document'].includes(files[0].type)">
        <ngx-dropzone-preview  
          class="preview-logo-dropzone"
          ngProjectAs="ngx-dropzone-preview" 
          *ngFor="let f of files" [file]="f" 
          (removed)="onRemove(f)" 
          [removable]="true"
          (click)="getImagePreview(f)"   
        >
          <ngx-dropzone-label><img src="assets/images/type-document/word.svg" alt="PDF Preview"></ngx-dropzone-label>      
        </ngx-dropzone-preview>
      </ng-container>

      <ng-container *ngIf="files.length > 0 && !['application/msword','application/pdf','application/vnd.openxmlformats-officedocument.wordprocessingml.document'].includes(files[0].type)">
        <ngx-dropzone-image-preview  
        class="preview-logo-dropzone"
          ngProjectAs="ngx-dropzone-preview"    
          *ngFor="let f of files" [file]="f" 
          (removed)="onRemove(f)" 
          [removable]="true"
          (click)="getImagePreview(f)"   
        >
        </ngx-dropzone-image-preview>

      </ng-container>


</ngx-dropzone>

<button *ngIf="btn" type="button"  (click)="dropzone.showFileSelector()" class="btn btn-sm btn-block btn-primary mt-2 w-100">Agregar archivo</button>
