<div class="modal-header" style="padding: 0px; max-height: 145px;">
  <img *ngIf="newSurvey" class="w-100" [src]="newSurvey.banner.location" alt="">
</div>

<div class="modal-body px-3" >
    <div class="px-5 d-flex align-items-center flex-column" *ngIf="!initSurvey ">
      <div class="flex mb-4 mt-5">
        <img class="mx-2" src="assets/images/encuesta/icon-smile.png" alt="">
        <img class="mx-2" src="assets/images/encuesta/icon-neutral.png" alt="">
        <img class="mx-2" src="assets/images/encuesta/icon-sad.png" alt="">
      </div>

      <h3 class="title-encuesta">{{newSurvey.title}}</h3>
      <p class="description-encuesta">{{newSurvey.subtitle}}</p>

      <button (click)="nextStepper()" class="btn btn-primary w-auto mt-4">Completar encuesta </button>

    </div>

  <ng-container *ngIf="initSurvey && !endSurvey">
    <app-steps-labels
     class="mt-4"
      [encuesta]="true"
      [labelsEncuesta]="labels"
      [textColorClass]="'text-primary'"
      [currentStep]="currentSlide"
    ></app-steps-labels>

    <ng-stepper class="stepper-no-header stepper-mt-0 mb-0 pb-0 " style="margin-top: -45px;" #cdkStepper [linear]="false" (selectionChange)="setCurrentSlider($event)">
      
      <cdk-step [optional]="false" *ngFor="let pregunta of newSurvey.questions; let indexPregunta = index">
        <ng-template cdkStepLabel></ng-template>

        <div class="px-3" style="min-height: 130px;">
           <h3 class="question">
            {{pregunta.question}}
            <button 
              *ngIf="pregunta.description"
              type="button" 
              class="btn btn-info ml-2" 
              [ngbTooltip]="pregunta.description" 
              triggers="click:blur"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path fill="#009042" d="M12 17q.425 0 .713-.288T13 16v-4q0-.425-.288-.712T12 11t-.712.288T11 12v4q0 .425.288.713T12 17m0-8q.425 0 .713-.288T13 8t-.288-.712T12 7t-.712.288T11 8t.288.713T12 9m0 13q-2.075 0-3.9-.788t-3.175-2.137T2.788 15.9T2 12t.788-3.9t2.137-3.175T8.1 2.788T12 2t3.9.788t3.175 2.137T21.213 8.1T22 12t-.788 3.9t-2.137 3.175t-3.175 2.138T12 22m0-2q3.35 0 5.675-2.325T20 12t-2.325-5.675T12 4T6.325 6.325T4 12t2.325 5.675T12 20m0-8"/></svg>
            </button>
          </h3>
          
            <div class="d-flex align-items-end" *ngIf="pregunta.answer?.type === 'Entrada de texto'">
                <!-- <input
                    type="text"
                    placeholder="Ingrese su repuesta"
                    class="form-control mr-1 w-100"
                /> -->
                <textarea class="form-control mr-1 w-100 mb-2" placeholder="Ingrese su repuesta" name="entradaTextor" id="entradaTextor" rows="4"></textarea>

            </div>

            <div class="px-0" style="min-height: 130px;" *ngIf="pregunta.answer?.type === 'Selección'">
              <ul class="style-list-survey mx-0 px-0" >
                <li  *ngFor="let respuesta of pregunta.answer?.options; let idexRespuesta = index" class="option-answer">
                  <input 
                    [(ngModel)]="respuesta.select" 
                    (click)="selectAnswer(indexPregunta,idexRespuesta)"
                    class="checkbox-encuesta mt-0 mr-2" 
                    type="checkbox" 
                    id="flexCheckDefault" 
                  >
                  <span class="answer">{{respuesta.option}}</span>
                </li>
              </ul>
            </div>
        </div>

        <div class="d-flex justify-content-end">
          <button (click)="indexPregunta === 0 ? prevViewSurvey() : prevStepper()" backButton class="btn mr-2 btn-secundary me-1 btn-150">Regresar</button>
          <button (click)="indexPregunta === (newSurvey.questions.length - 1) ? completeSurvey(pregunta) : nextStepperValidAnwer(pregunta)"  class="btn btn-primary btn-next">{{indexPregunta === (newSurvey.questions.length - 1) ? 'Enviar encuesta' : 'Siguiente'}} </button>
        </div>
      </cdk-step>
    
    </ng-stepper> 

  </ng-container>

    <ng-container *ngIf="endSurvey">
      <div class="px-5 d-flex align-items-center flex-column" >

        <h3 class="title-agradecimiento-encuesta mt-4">{{newSurvey.titleAgradecimiento}}</h3>
        <p class="description-agradecimiento-encuesta">{{newSurvey.subtitleAgradecimiento}}</p>

        <div class="flex mb-4 mt-3 justify-content-center">
          <img class="mx-2" src="assets/images/encuesta/complete.png" alt="">
        </div>

      </div>


      <div class="w-100 d-flex justify-content-center my-3">
        <button class="btn btn-primary btn-150" (click)="ngbActiveModal.close()">Cerrar</button>
      </div>
  </ng-container>

    
</div>
