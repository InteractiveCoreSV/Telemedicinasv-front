
    <!-- Card -->
    <div class="card graficas" style="overflow: auto; box-shadow: #2E4A76 0px 3px 8px; ;">
      <div class="d-flex justify-content-end my-2">
        <button type="button" class="btn btn-sm btn-ghost-primary mr-2 "(click)="exportToExcel()">
          Descargar Excel <i class="fas fa-file-download"></i>
        </button>
      </div>

        <div style="justify-content: center;" class="card-header">
            <h5 class="card-header-title fw-custom custom-title-statistics">Tiempo promedio de consulta</h5>
        </div>
        
      <!-- Header -->
      <div class="card-header">
        <div class="row w-100 mb-1">
            <div class="col-sm-6 col-md-4 ">
              <div class="d-flex ">
                <button
                  [rangesSelect]="'day'"
                  [daterangepicker]="'predefined'"
                  [rangeDate]="filters.rangeDates"
                  #datePicker
                  class="btn btn-current-date dropdown-toggle filterDate d-flex justify-content-center "
                  style="width: 100% !important; min-width: 200px !important; background-color: #f5f5f5 !important;"
                >
                  <i class="tio-date-range"></i>
                  <span #predefinedPreview class="ml-1"></span>
                </button>
                <button
                  class="btn btn-ghost-secondary  p-2"
                  *ngIf="btnCancelSearchByDates"
                  (click)="searchWithoutDates()"
                >
                  <i class="tio-clear icon-botton"></i>
                </button>
              </div>
            </div>

            <div class="col-sm-6 col-md-6 ">
                <app-select-medico (changeEmployeeObject)="setDataMedico($event)"></app-select-medico>
            </div>
          <!-- <div class="col-12 mb-2 mb-lg-0">
            <div class="d-flex align-items-center">
              <button (click)="todayBtn()" type="button" class="btn btn-white mr-3">Fecha actual</button>

              <button (click)="prevBtn()" type="button"
                class="btn btn-icon btn-sm btn-ghost-secondary btn-no-focus rounded-circle mr-1" tooltip="Mes anterior"
                title="Mes Anterior">
                <i class="tio-chevron-left"></i>
              </button>
              <button (click)="nextBtn()" type="button"
                class="btn btn-icon btn-sm btn-ghost-secondary btn-no-focus rounded-circle ml-1" tooltip="Siguiente mes"
                title="Siguiente mes">
                <i class="tio-chevron-right"></i>
              </button>

              <div class="ml-3">
                <h4 class="h3 mb-0 text-capitalize" >{{currentYearDate }}</h4>
              </div>
            </div>
          </div> -->
        </div>
      </div>
      <!-- End Header -->
       
      <!-- Body -->
      <div class="card-body grafica_lineal">

        <!-- Bar Chart -->
        <ng-container *ngIf="!loadGraficUsers">

          <ng-container *ngIf="!loadGraficUsers">
            <div class="chartjs-custom " *ngIf="data.length>0;else not_results">
              <div style="height: 20rem;">
                <app-line-chart [datasets]="dataLine" [labels]="labelsBar" [prefixTicks]="' Minutos'"></app-line-chart>
              </div>
            </div>
          </ng-container>

          <ng-template #not_results>
            <app-not-results-table [title]="'para mostrar en la gráfica'"></app-not-results-table>
          </ng-template>
        </ng-container>

       
  

        <ng-container *ngIf="loadGraficUsers">
          <div colspan="6" class="text-center pt-5">
            <div class="spinner-grow" style="width: 3rem; height: 3rem;" role="status">
            </div>
          </div>
        </ng-container>

        <!-- End Bar Chart -->
      </div>
      <!-- End Body -->
    </div>
    <!-- End Card -->
