<div class="modal-header">
    <h5 class="modal-title" id="addQuestionLabel">{{title}} especialidad</h5>
    <button type="button" class="btn btn-sm p-0 close " (click)="ngbActiveModal.close()">          
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M19 5L5 19M5.00001 5L19 19" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

</div>
<div class="modal-body">
    <div class="container mb-4 mt-2 " >

        <form [formGroup]="especialidadForm" style="max-width: 724px;" class="px-md-5">
        
            <div class="form-gorup col-12 col-md-9">
                <label for="" class="form-label">Nombre de la especialidad</label>
                <input type="text" class="form-control center"  name="name" formControlName="name" placeholder="Nombre" >
                <div *ngIf="especialidadForm.get('name')?.invalid && formSubmited" class="invalid-feedback d-block" >
                    El nombre es requerido
                </div>
            </div> 
            
        </form>
    </div>

    <div class=" d-flex justify-content-end">
        <button type="submit" (click)="toEdit?editEspecialidad():newEspecialidad()" class="btn  btn-primary btn-150">
            + Agregar
        </button>
    </div>
</div>
