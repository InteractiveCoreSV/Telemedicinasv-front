<div class="modal-header">
  <h5 class="modal-title">Procesando pago</h5>
</div>
<div class="modal-body">
  <iframe [srcdoc]="iframeHtml" frameborder="0" width="100%" height="500"></iframe>
</div>

<div *ngIf="showButton" class="modal-footer">
  <button (click)="ngbActiveModal.dismiss({ paymentComplete: true })" class="btn btn-primary">Continuar y salir</button>
</div>
