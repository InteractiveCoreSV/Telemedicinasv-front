

    <!-- Sticky Block Start Point -->
    <div id="accountSidebarNav"></div>

    <!-- Card -->
    <div style="position: sticky;top: 0;" class="js-sticky-block card mb-3 mb-lg-5" data-hs-sticky-block-options='{
               "parentSelector": "#accountSidebarNav",
               "breakpoint": "lg",
               "startPoint": "#accountSidebarNav",
               "endPoint": "#stickyBlockEndPoint",
               "stickyOffsetTop": 20
             }'>
      <!-- Header -->
      <div class="card-header">
        <h5 class="card-header-title">Profile</h5>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="card-body" *ngIf="userInfo">
        <ul class="list-unstyled list-unstyled-py-3 text-dark mb-3">
          <li class="py-0">
            <small class="card-subtitle">Información</small>
          </li>

          <li>
            <i class="tio-user-outlined nav-icon"></i>
            {{userInfo.names}} {{userInfo.last_names}}
          </li>
          <li *ngIf="userInfo?.roles">
            <i class="tio-briefcase-outlined nav-icon"></i>
            {{userInfo && userInfo.roles != undefined?userInfo.roles[0].nameEs:''}}
          </li>
          <!-- <li>
            <i class="tio-city nav-icon"></i>
            Vertikal Company
          </li> -->

          <li class="pt-2 pb-0">
            <small class="card-subtitle">Contactos</small>
          </li>

          <li>
            <i class="tio-online nav-icon"></i>
            {{userInfo.email}}
          </li>
          <li class=" d-flex">
            <i class="tio-android-phone-vs nav-icon"></i>
            <p class="d-flex justify-content-center">
              <span class="mr-1">{{userInfo.countryCode}}</span> <input type="text" [mask]="userInfo.mask" class="viewInputFormatMask" disabled [(ngModel)]="userInfo.phone"  [ngModelOptions]="{standalone: true}">
            </p>
          </li>
<!-- 
          <li class="pt-2 pb-0">
            <small class="card-subtitle">Teams</small>
          </li>

          <li>
            <i class="tio-group-equal nav-icon"></i>
            Lorem Ipsum is simply dummy
          </li>
          <li>
            <i class="tio-briefcase-outlined nav-icon"></i>
            Lorem Ipsum is simply dummy
          </li> -->
        </ul>
      </div>
      <!-- End Body -->
    </div>
    <!-- End Card -->
